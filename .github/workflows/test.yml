name: Tests

# Run once per change, not twice. `on: [push, pull_request]` would fire
# both events whenever a PR branch is pushed (push → `refs/heads/<branch>`,
# pull_request → `refs/pull/<n>/merge`), doubling CI minutes. Restricting
# `push` to `main` means branch pushes only run under the PR; `main` still
# gets CI on direct pushes / merges.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch so stale pushes don't burn billing.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Style and formatting gate. Cheap (<1 min) and runs in parallel with
  # the test job so a style violation surfaces immediately without
  # waiting for the test suite. swiftlint+swiftformat configs live in
  # `.swiftlint.yml` and `.swiftformat`; both run with --strict so
  # warnings are treated as errors.
  lint:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 2

      - name: Install swiftlint and swiftformat
        timeout-minutes: 3
        run: |
          brew update >/dev/null
          brew install swiftlint swiftformat
          swiftlint --version
          swiftformat --version

      # Both run scoped to the Swift source roots. Without scoping,
      # swiftlint scans `scripts/.build-libvlc/` (the upstream VLC source
      # tree, multi-GB of C and headers), which makes it run for many
      # minutes and consume gigabytes of RAM.
      - name: SwiftLint
        timeout-minutes: 2
        run: swiftlint lint --strict --quiet Sources Tests Showcase

      - name: SwiftFormat
        timeout-minutes: 2
        run: swiftformat Sources Tests Showcase --lint --strict

  # Showcase apps build gate. Catches API breakage that the SwiftVLC
  # test suite wouldn't notice — e.g. renaming a public symbol used
  # only by the Showcase, or breaking the Showcase's Mac/iOS/tvOS/visionOS
  # build settings. We compile (not test) every scheme.
  #
  # Schemes are pinned in the Showcase Xcode project to a published
  # `SwiftVLC` version. `setup-dev.sh` flips it to the local repo
  # checkout so the Showcase compiles against the in-PR code rather
  # than the last release.
  showcase:
    # Xcode's package graph resolver checks Package.swift's tools-version
    # with Xcode's built-in SwiftPM, not the open-source toolchain passed
    # through `-toolchain`. SwiftVLC's manifest requires Swift 6.3, so the
    # Showcase matrix must run on an image with Xcode 26.4+.
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scheme: [iOS, macOS, tvOS, visionOS]
        include:
          - scheme: iOS
            destination: "generic/platform=iOS"
          - scheme: macOS
            destination: "generic/platform=macOS"
          - scheme: tvOS
            destination: "generic/platform=tvOS"
          - scheme: visionOS
            destination: "generic/platform=visionOS"
    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 2

      - uses: maxim-lobanov/setup-xcode@v1
        timeout-minutes: 5
        with:
          xcode-version: "26.4"

      - name: Print toolchain
        timeout-minutes: 1
        run: |
          xcodebuild -version
          xcrun swift --version

      # The libvlc xcframework dominates the artifact cache.
      - name: Cache libvlc xcframework
        uses: actions/cache@v5
        timeout-minutes: 5
        with:
          path: Vendor
          key: libvlc-xcf-vendor-${{ hashFiles('Package.swift') }}
          enableCrossOsArchive: false

      # Download the libvlc xcframework + flip the Showcase project to
      # the local SwiftVLC checkout so we compile against in-PR code.
      - name: Set up Vendor + local Swift package
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/setup-dev.sh

      - name: Build Showcase (${{ matrix.scheme }})
        timeout-minutes: 20
        run: |
          xcodebuild build \
            -project Showcase/SwiftVLCShowcase.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  test:
    # `macos-latest` tracks the newest GitHub-provided runner. SwiftVLC
    # requires Swift 6.3 (Package.swift tools-version), and the current
    # 6.3 patch is Swift 6.3.1 in Xcode 26.4.1. GHA runner toolchains
    # can lag, so we install the Swift 6.3.1 open-source toolchain from
    # swift.org and activate it via the TOOLCHAINS env var.
    runs-on: macos-latest
    # Absolute ceiling — the job CANNOT run longer than this. The wrapper
    # script and step timeouts below enforce tighter bounds; this is the
    # last line of defense if those fail.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 2

      # Pin Xcode for SDKs / linker / simulators. Current GHA runners
      # can lag behind the package's tools-version 6.3 manifest, so we
      # install the Swift 6.3.1 open-source toolchain separately below
      # and invoke it through
      # `xcrun --toolchain`.
      - uses: maxim-lobanov/setup-xcode@v1
        timeout-minutes: 5
        with:
          xcode-version: latest-stable

      # Install Swift 6.3.1 open-source toolchain from swift.org.
      # Exports $TOOLCHAINS — later steps use `xcrun --toolchain` to run
      # Swift 6.3.1 on top of the already-set-up Xcode SDKs.
      #
      # Pinned to v1.14.0 (latest as of 2026-04-27) rather than @latest
      # or @v1 so a compromised or breaking release of the action cannot
      # silently affect our CI. Bump deliberately via Dependabot or a
      # manual PR.
      - uses: SwiftyLab/setup-swift@v1.14.0
        timeout-minutes: 8
        with:
          swift-version: "6.3.1"

      - name: Print toolchain
        timeout-minutes: 1
        run: xcrun --toolchain "$TOOLCHAINS" swift --version

      # CI should always test against the last published xcframework (what
      # SPM consumers get), regardless of whether the checkout currently
      # points at Vendor/ for local dev or already carries a release URL.
      # Only the libvlc binaryTarget is rewritten; other Package.swift
      # edits are preserved.
      - name: Point Package.swift at last released xcframework
        id: xcf
        timeout-minutes: 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/ci-use-released-xcframework.sh

      # The xcframework is the dominant artifact (~1.2 GB unzipped). Keying
      # on the checksum means the cache only invalidates when the binary
      # actually changes — unrelated Package.swift edits don't bust it.
      - name: Cache libvlc xcframework
        uses: actions/cache@v5
        timeout-minutes: 5
        with:
          path: .build/artifacts
          key: libvlc-xcf-${{ steps.xcf.outputs.sha }}
          enableCrossOsArchive: false

      # Compiled outputs — safe to cache across runs with the same toolchain
      # and source state.
      - name: Cache build products
        uses: actions/cache@v5
        timeout-minutes: 3
        with:
          path: |
            .build/debug
            .build/arm64-apple-macosx
            .build/x86_64-apple-macosx
          key: spm-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Sources/**/*.c', 'Sources/**/*.h', 'Tests/**/*.swift') }}
          restore-keys: |
            spm-build-${{ runner.os }}-

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        timeout-minutes: 2
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/workspace-state.json
          key: spm-deps-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-deps-${{ runner.os }}-

      # swift test is run through ci-run-with-timeouts.py which enforces
      # both a wall-clock ceiling and an idle watchdog. If either fires
      # the entire process group is SIGKILLed.
      #
      #   wall_clock = 600s  (10 min)  — enough for fresh xcf download
      #                                  + cold build + test run on a
      #                                  slow runner; well inside the
      #                                  20-minute job ceiling.
      #   idle       = 180s  (3 min)   — swift test emits a line per
      #                                  test / suite; 3 min of silence
      #                                  means the test process is stuck.
      #
      # --no-parallel is load-bearing: `Player` is `@MainActor`, so
      # integration tests that drive libVLC to `.playing` all compete
      # for the same actor under Swift Testing's default parallel mode.
      # On a GHA runner that contention stretches a 200 ms test into a
      # multi-second timeout. Running serially takes ~45 s for the whole
      # suite with zero flakes — fractions of a cent in GHA billing and
      # vastly more predictable than paying for periodic retries.
      - name: Run tests (wall-clock + idle timeouts)
        timeout-minutes: 12
        env:
          # TestCondition.canPlayMedia reads CI to skip playback tests that
          # need video output — CI macOS runners are headless.
          CI: "true"
        # `xcrun --toolchain "$TOOLCHAINS" swift test` routes through the
        # Swift 6.3.1 toolchain installed above, while still using the
        # Xcode-provided SDKs/simulators.
        run: |
          ./scripts/ci-run-with-timeouts.py 600 180 \
            xcrun --toolchain "$TOOLCHAINS" swift test --no-parallel --enable-code-coverage

      - name: Export coverage report
        timeout-minutes: 1
        run: ./scripts/export-lcov.sh

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .build/local-quality/coverage/lcov.info
          disable_search: true
          flags: swiftpm
          name: swiftvlc-swiftpm

      - name: Doc coverage
        timeout-minutes: 3
        run: ./scripts/doc-coverage.sh
